<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartTailor | Analytics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --primary: #059669;
            --primary-light: #ECFDF5;
            --bg-body: #F3F4F6;
            --sidebar-bg: #e8dcc8;
            --header-bg: #e8dcc8;
            --text-main: #111827;
            --text-muted: #4B5563;
            --border: #D1D5DB;
            --sidebar-width: 260px;
            --radius-xl: 24px;
            --radius-lg: 16px;
            --radius-md: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-body);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: var(--sidebar-width);
            background: var(--sidebar-bg);
            height: 100vh;
            position: fixed;
            left: 0;
            padding: 2rem;
            border-right: 1px solid rgba(0, 0, 0, 0.05);
        }

        .nav-item {
            padding: 1rem;
            border-radius: var(--radius-md);
            color: var(--text-muted);
            text-decoration: none;
            margin-bottom: 0.5rem;
            display: block;
            border: 1px solid rgba(0, 0, 0, 0.05);
            background-color: rgba(255, 255, 255, 0.3);
        }

        .main-wrapper {
            margin-left: var(--sidebar-width);
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .global-header {
            height: 80px;
            background: var(--header-bg);
            padding: 0 2.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .content-body {
            flex: 1;
            overflow-y: auto;
            padding: 2.5rem;
        }

        .chart-card {
            background: white;
            padding: 2rem;
            border-radius: var(--radius-xl);
            border: 1px solid var(--border);
            margin-bottom: 2rem;
            height: 400px;
        }
    </style>
</head>

<body>
    <aside class="sidebar">
        <div class="logo" style="margin-bottom:3rem; font-weight:800; color:var(--primary); font-size:1.5rem;">
            SmartTailor</div>
        <nav class="nav-menu">
            <a href="dashboard.html" class="nav-item">Home</a>
            <a href="order.html" class="nav-item">Orders</a>
            <a href="reviews.html" class="nav-item">Reviews</a>
            <a href="income.html" class="nav-item">Income</a>
            <a href="messages.html" class="nav-item">Messages</a>
            <a href="profile.html" class="nav-item">Me</a>
        </nav>
    </aside>

    <main class="main-wrapper">
        <header class="global-header">
            <div class="header-left" style="display: flex; align-items: center; gap: 1rem;">
                <a href="dashboard.html"
                    style="background:none; border:none; cursor:pointer; color:var(--text-main); display:flex; align-items:center;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                    </svg>
                </a>
                <h2 style="font-weight:700;">Deep Analytics</h2>
            </div>
            <div class="header-right"><img src="images/2.png" style="width:44px; height:44px; border-radius:50%;"></div>
        </header>

        <div class="content-body">
            <div class="chart-card"><canvas id="detailedChart"></canvas></div>
        </div>
    </main>

    <script>
        const ctx = document.getElementById('detailedChart').getContext('2d');

        // Create Gradient
        const gradient = ctx.createLinearGradient(0, 0, 0, 400);
        gradient.addColorStop(0, '#059669');
        gradient.addColorStop(1, '#34D399');

        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug'],
                datasets: [
                    {
                        label: 'Performance 2025',
                        data: [65, 59, 80, 81, 56, 55, 40, 70],
                        backgroundColor: gradient,
                        borderRadius: 6,
                        barPercentage: 0.6,
                        categoryPercentage: 0.8
                    },
                    {
                        label: 'Target',
                        data: [45, 49, 60, 71, 46, 45, 30, 60],
                        backgroundColor: '#E5E7EB',
                        borderRadius: 6,
                        barPercentage: 0.6,
                        categoryPercentage: 0.8,
                        hidden: true // Hidden by default to keep it clean, toggleable
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'top',
                        align: 'end',
                        labels: { usePointStyle: true, boxWidth: 8 }
                    },
                    tooltip: {
                        backgroundColor: 'rgba(255, 255, 255, 0.9)',
                        titleColor: '#111827',
                        bodyColor: '#4B5563',
                        borderColor: '#E5E7EB',
                        borderWidth: 1,
                        padding: 12,
                        displayColors: true,
                        usePointStyle: true
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        grid: { borderDash: [4, 4], drawBorder: false },
                        ticks: { color: '#9CA3AF' }
                    },
                    x: {
                        grid: { display: false, drawBorder: false },
                        ticks: { color: '#6B7280', font: { weight: '500' } }
                    }
                },
                animation: {
                    duration: 1000,
                    easing: 'easeOutQuart'
                }
            }
        });
    </script>
</body>

</html>
