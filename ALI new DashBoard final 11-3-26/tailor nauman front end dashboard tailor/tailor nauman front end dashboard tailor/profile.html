<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartTailor | Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #059669;
            --primary-light: #ECFDF5;
            --bg-body: #F3F4F6;
            --surface: #FFFFFF;
            --sidebar-bg: #e8dcc8;
            --header-bg: #e8dcc8;
            --text-main: #111827;
            --text-muted: #4B5563;
            --border: #D1D5DB;
            --sidebar-width: 260px;
            --radius-xl: 24px;
            --radius-lg: 16px;
            --radius-md: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-body);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: var(--sidebar-width);
            background: var(--sidebar-bg);
            height: 100vh;
            position: fixed;
            left: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(0, 0, 0, 0.05);
        }

        .nav-item {
            padding: 1rem;
            border-radius: var(--radius-md);
            color: var(--text-muted);
            text-decoration: none;
            margin-bottom: 0.5rem;
            display: block;
            background-color: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .nav-item.active {
            background-color: var(--primary);
            color: white;
            font-weight: 700;
        }

        .main-wrapper {
            margin-left: var(--sidebar-width);
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .global-header {
            height: 80px;
            background: var(--header-bg);
            padding: 0 2.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .content-body {
            flex: 1;
            overflow-y: auto;
            padding: 2.5rem;
        }

        .profile-banner {
            background: var(--primary);
            border-radius: var(--radius-xl);
            padding: 2.5rem;
            color: white;
            display: flex;
            align-items: center;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .settings-card {
            background: white;
            padding: 2rem;
            border-radius: var(--radius-xl);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .settings-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }

        .edit-btn {
            background: var(--primary-light);
            color: var(--primary);
            border: none;
            padding: 0.5rem;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <aside class="sidebar">
        <div class="logo" style="margin-bottom:3rem; font-weight:800; color:var(--primary); font-size:1.5rem;">
            SmartTailor</div>
        <nav class="nav-menu">
            <a href="dashboard.html" class="nav-item">Home</a>
            <a href="order.html" class="nav-item">Orders</a>
            <a href="reviews.html" class="nav-item">Reviews</a>
            <a href="income.html" class="nav-item">Income</a>
            <a href="messages.html" class="nav-item">Messages</a>
            <a href="profile.html" class="nav-item active">Me</a>
        </nav>
    </aside>

    <main class="main-wrapper">
        <header class="global-header">
            <div class="header-left" style="display: flex; align-items: center; gap: 1rem;">
                <a href="dashboard.html"
                    style="background:none; border:none; cursor:pointer; color:var(--text-main); display:flex; align-items:center;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                    </svg>
                </a>
                <h2 style="font-weight:700;">Account Profile</h2>
            </div>
            <div class="header-right" style="margin-left:auto;">
                <div class="profile-header">
                    <img src="images/2.png"
                        style="width:44px; height:44px; border-radius:50%; border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
                </div>
            </div>
        </header>

        <div class="content-body">
            <div class="profile-banner">
                <img src="images/2.png" style="width:100px; height:100px; border-radius:20px; border:3px solid white;">
                <div>
                    <h1 style="font-size:2rem; font-weight:700;">Nauman Irshad</h1>
                    <p>Shop ID: PK2NBNTP4TH</p>
                </div>
            </div>

            <div id="main-view">
                <h3 style="margin-bottom:1.5rem; font-weight:700;">Settings</h3>
                <div class="settings-grid">
                    <div class="settings-card" onclick="alert('Manage Seller details')">
                        <div style="font-size:1.2rem; font-weight:700; margin-bottom:0.5rem;">Seller Account</div>
                        <p style="color:gray; font-size:0.9rem;">Personal and shop information.</p>
                    </div>
                    <div class="settings-card" onclick="alert('Manage Bank details')">
                        <div style="font-size:1.2rem; font-weight:700; margin-bottom:0.5rem;">Bank Account</div>
                        <p style="color:gray; font-size:0.9rem;">Payment methods and payouts.</p>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
