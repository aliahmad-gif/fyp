<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartTailor | Orders</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #059669;
            --primary-light: #ECFDF5;
            --bg-body: #F3F4F6;
            --surface: #FFFFFF;
            --sidebar-bg: #e8dcc8;
            --header-bg: #e8dcc8;
            --text-main: #111827;
            --text-muted: #4B5563;
            --border: #D1D5DB;
            --sidebar-width: 260px;
            --radius-lg: 16px;
            --radius-md: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-body);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: var(--sidebar-width);
            background: var(--sidebar-bg);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(0, 0, 0, 0.05);
        }

        .nav-item {
            padding: 1rem;
            border-radius: var(--radius-md);
            color: var(--text-muted);
            text-decoration: none;
            margin-bottom: 0.5rem;
            display: block;
            border: 1px solid rgba(0, 0, 0, 0.05);
            background-color: rgba(255, 255, 255, 0.3);
            transition: 0.2s;
        }

        .nav-item.active {
            background-color: var(--primary);
            color: white;
            font-weight: 700;
        }

        .main-wrapper {
            margin-left: var(--sidebar-width);
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .global-header {
            height: 80px;
            background: var(--header-bg);
            padding: 0 2.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .content-body {
            flex: 1;
            overflow-y: auto;
            padding: 2.5rem;
        }

        .filter-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .filter-tab {
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            background: white;
            border: 1px solid var(--border);
            cursor: pointer;
            font-weight: 600;
        }

        .filter-tab.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .order-card-detailed {
            background: white;
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid var(--border);
        }

        .order-header-row {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #f3f4f6;
            padding-bottom: 1rem;
            margin-bottom: 1rem;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .bg-yellow {
            background: #FFFBEB;
            color: #D97706;
        }

        .bg-green {
            background: #ECFDF5;
            color: #059669;
        }

        .action-btns {
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 1rem;
        }

        .btn-sm {
            padding: 0 1rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            cursor: pointer;
            font-weight: 600;
            height: 40px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .btn-sm:hover {
            transform: translateY(-1px);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
    </style>
</head>

<body>
    <aside class="sidebar">
        <div class="logo" style="margin-bottom:3rem; font-weight:800; color:var(--primary); font-size:1.5rem;">
            SmartTailor</div>
        <nav class="nav-menu">
            <a href="dashboard.html" class="nav-item">Home</a>
            <a href="order.html" class="nav-item active">Orders</a>
            <a href="reviews.html" class="nav-item">Reviews</a>
            <a href="income.html" class="nav-item">Income</a>
            <a href="messages.html" class="nav-item">Messages</a>
            <a href="profile.html" class="nav-item">Me</a>
        </nav>
    </aside>

    <main class="main-wrapper">
        <header class="global-header">
            <div class="header-left" style="display: flex; align-items: center; gap: 1rem;">
                <a href="dashboard.html"
                    style="background:none; border:none; cursor:pointer; color:var(--text-main); display:flex; align-items:center;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                    </svg>
                </a>
                <h2 style="font-weight:700;">All Orders</h2>
            </div>
            <div class="header-right" style="margin-left:auto;">
                <a href="profile.html" class="profile-header"
                    style="display: flex; align-items: center; gap: 1rem; text-decoration: none; color: inherit;">
                    <div class="profile-info" style="text-align: right;">
                        <h4 style="font-size:0.95rem; font-weight: 600;">Nauman Irshad</h4>
                        <p style="font-size:0.75rem; color:var(--text-muted);">Tailor Shop</p>
                    </div>
                    <img src="images/2.png"
                        style="width:44px; height:44px; border-radius:50%; border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
                </a>
            </div>
        </header>

        <div class="content-body">
            <div class="filter-tabs">
                <button class="filter-tab active">All Orders</button>
                <button class="filter-tab">Active</button>
                <button class="filter-tab">Completed</button>
                <button class="filter-tab">Cancelled</button>
            </div>

            <div class="order-list">
                <div class="order-card-detailed">
                    <div class="order-header-row">
                        <div>
                            <h3 style="font-weight:700;">#ORD-2025-001</h3>
                            <small style="color:gray;">Oct 24, 2025</small>
                        </div>
                        <span class="badge bg-yellow">In Progress</span>
                    </div>
                    <div style="display:flex; gap:1rem;">
                        <img src="images/1.png"
                            style="width:80px; height:80px; border-radius:12px; border:1px solid var(--border);">
                        <div>
                            <h4 style="font-weight:600;">Custom Linen Suit</h4>
                            <p style="color:gray; font-size:0.9rem;">Size: Custom (M)</p>
                            <p style="font-weight:700; color:var(--primary);">Rs 4,500</p>
                        </div>
                    </div>
                    <div class="action-btns">
                        <button class="btn-sm">Size Chart</button>
                        <button class="btn-sm" onclick="window.location.href='messages.html'">Chat with Seller</button>
                        <button class="btn-sm btn-primary">Track Order</button>
                    </div>
                </div>

                <div class="order-card-detailed">
                    <div class="order-header-row">
                        <div>
                            <h3 style="font-weight:700;">#ORD-2024-892</h3>
                            <small style="color:gray;">Oct 12, 2024</small>
                        </div>
                        <span class="badge bg-green">Delivered</span>
                    </div>
                    <div style="display:flex; gap:1rem;">
                        <img src="images/3.png"
                            style="width:80px; height:80px; border-radius:12px; border:1px solid var(--border);">
                        <div>
                            <h4 style="font-weight:600;">Summer Floral Dress</h4>
                            <p style="color:gray; font-size:0.9rem;">Size: L</p>
                            <p style="font-weight:700; color:var(--primary);">Rs 2,800</p>
                        </div>
                    </div>
                    <div class="action-btns">
                        <button class="btn-sm">Size Chart</button>
                        <button class="btn-sm" onclick="window.location.href='messages.html'">Chat with Seller</button>
                        <button class="btn-sm btn-primary">Re-order</button>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
